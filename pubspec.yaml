name: lifestream_ai
description: LifeStream AI — Smart Blood & Donor Network.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # Animations
  flutter_animate: ^4.5.0
  animations: ^2.0.11

  # OTP Input
  pinput: ^5.0.0

  # Location
  geolocator: ^12.0.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Image / Storage
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2

  # Contacts / URL
  url_launcher: ^6.3.0

  # UI / Fonts
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_screenutil: ^5.9.0

  # Icons
  cupertino_icons: ^1.0.6

  # Utilities
  equatable: ^2.0.5
  google_sign_in: ^6.2.1

  # Donor Hero Module
  shimmer: ^3.0.0
  lottie: ^3.1.0
  qr_flutter: ^4.1.0
  flip_card: ^0.7.0
  firebase_messaging: ^15.1.0
  google_generative_ai: ^0.4.6
  flutter_local_notifications: ^17.2.3
  pdf: ^3.12.0
  printing: ^5.14.3
  uuid: ^4.5.3
  intl: ^0.20.2
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - .env
